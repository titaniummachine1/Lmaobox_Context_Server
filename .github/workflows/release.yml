name: Build Runtime Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_name: lmaobox-context-runtime_windows_amd64.zip
            binary_name: lmaobox-context-server.exe
          - goos: linux
            goarch: amd64
            asset_name: lmaobox-context-runtime_linux_amd64.zip
            binary_name: lmaobox-context-server
          - goos: linux
            goarch: arm64
            asset_name: lmaobox-context-runtime_linux_arm64.zip
            binary_name: lmaobox-context-server
          - goos: darwin
            goarch: amd64
            asset_name: lmaobox-context-runtime_darwin_amd64.zip
            binary_name: lmaobox-context-server
          - goos: darwin
            goarch: arm64
            asset_name: lmaobox-context-runtime_darwin_arm64.zip
            binary_name: lmaobox-context-server

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build packaged runtime archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          set -euo pipefail

          rm -rf dist runtime-stage
          mkdir -p dist runtime-stage/automations

          go build -trimpath -o "runtime-stage/${BINARY_NAME}" .

          if [ -d data/smart_context ]; then
            cp -R data/smart_context runtime-stage/smart_context
          else
            cp -R smart_context runtime-stage/smart_context
          fi
          cp -R types runtime-stage/types

          if [ -d automations/bin ]; then
            cp -R automations/bin runtime-stage/automations/bin
          fi

          if [ -d vscode-extension/snippets ]; then
            cp -R vscode-extension/snippets runtime-stage/snippets
          fi

          cp README.md runtime-stage/README.md
          cp LICENSE runtime-stage/LICENSE

          (
            cd runtime-stage
            zip -r "../dist/${ASSET_NAME}" .
          )

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-runtime
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify extension version matches tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./vscode-extension/package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match vscode-extension version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Sync bundled assets into extension package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf vscode-extension/assets/types vscode-extension/assets/smart_context
          mkdir -p vscode-extension/assets
          cp -R types vscode-extension/assets/types
          if [ -d data/smart_context ]; then
            cp -R data/smart_context vscode-extension/assets/smart_context
          else
            cp -R smart_context vscode-extension/assets/smart_context
          fi

      - name: Package VSIX
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./vscode-extension/package.json').version")
          mkdir -p dist
          cd vscode-extension
          npx --yes @vscode/vsce package -o "../dist/lmaobox-context-${VERSION}.vsix"

      - name: Download packaged runtimes
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.zip > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/checksums.txt
            dist/*.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./vscode-extension/package.json').version")
          npx --yes @vscode/vsce publish --packagePath "dist/lmaobox-context-${VERSION}.vsix"
